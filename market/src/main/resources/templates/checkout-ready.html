<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 대기 - coopang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f0f0; }
    </style>
</head>
<body class="pb-20">
<div class="bg-white border-b border-gray-200 py-6 mb-8">
    <div class="max-w-[1000px] mx-auto px-4 flex justify-between items-end">
        <div class="flex items-center gap-2">
            <a href="/products" class="text-[#0073e9] font-bold text-3xl italic tracking-tighter cursor-pointer">
                <span class="text-[#0073e9]">coo</span><span class="text-[#ff1c1c]">pang</span>
            </a>
            <h1 class="text-2xl font-bold ml-4">결제 대기</h1>
        </div>
        <div class="flex items-center gap-2 text-[13px] font-bold">
            <span class="text-[#0073e9]">결제진행중</span>
        </div>
    </div>
</div>

<main class="max-w-[1000px] mx-auto px-4 grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-6">
    <div class="flex flex-col gap-6">
        <section class="bg-white border border-gray-200 rounded-sm p-6 shadow-sm">
            <h2 class="text-xl font-bold mb-4">주문 정보</h2>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between border-b border-gray-100 py-2"><span>주문번호</span><strong th:text="${order.id}">1001</strong></div>
                <div class="flex justify-between border-b border-gray-100 py-2"><span>상품명</span><strong th:text="${order.product.name()}">상품명</strong></div>
                <div class="flex justify-between border-b border-gray-100 py-2"><span>수량</span><strong th:text="${order.quantity + '개'}">1개</strong></div>
                <div class="flex justify-between border-b border-gray-100 py-2"><span>결제 예정 금액</span><strong th:text="${#numbers.formatInteger(order.totalAmount, 3, 'COMMA') + '원'}">0원</strong></div>
                <div class="flex justify-between border-b border-gray-100 py-2"><span>현재 상태</span><strong id="orderStatus" class="text-[#0073e9]" th:text="${order.status}">PENDING</strong></div>
            </div>
            <div class="mt-6 rounded-sm border border-[#d9e9ff] bg-[#f5f9ff] p-4 text-sm font-semibold text-[#1d4ed8]">
                결제를 진행하면 자동으로 결과 페이지로 이동합니다.
            </div>
        </section>
    </div>

    <aside class="relative">
        <div class="sticky top-24 bg-white border border-gray-200 rounded-sm p-6 shadow-sm">
            <h3 class="text-xl font-bold mb-4">결제 실행</h3>
            <button id="payOpenButton" type="button" class="w-full bg-[#346aff] text-white font-bold py-4 rounded-sm text-lg hover:bg-blue-600 transition-colors shadow-md">
                고라니페이 결제하기
            </button>
            <a th:href="@{/orders/{id}/result(id=${order.id})}" class="mt-3 w-full inline-flex justify-center border border-gray-300 text-[#333] font-bold py-3 rounded-sm text-sm hover:bg-gray-50 transition-colors">
                결과 페이지로 이동
            </a>
        </div>
    </aside>
</main>

<script th:inline="javascript">
    const orderId = [[${order.id}]];
    const payWindowUrl = /*[[${payCheckoutUrl}]]*/ '';

    function buildPayLoadingHtml() {
        return `
<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고라니페이 연결 중</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f4f7ff; color:#1f2937; }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:420px; background:#fff; border:1px solid #d9deea; border-radius:14px; padding:24px; text-align:center; box-shadow:0 8px 28px rgba(18,52,86,0.08); }
    .spinner { width:36px; height:36px; margin:0 auto 14px; border:4px solid #d1ddff; border-top-color:#346aff; border-radius:50%; animation:spin 0.8s linear infinite; }
    .title { margin:0; font-size:20px; font-weight:700; }
    .desc { margin:10px 0 0; font-size:14px; color:#5b6475; line-height:1.5; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="spinner"></div>
      <h1 class="title">고라니페이 로그인 확인 중</h1>
      <p class="desc">잠시만 기다려 주세요. 결제 창으로 안전하게 이동합니다.</p>
    </div>
  </div>
</body>
</html>`;
    }

    document.getElementById('payOpenButton').addEventListener('click', function () {
        const popup = window.open('', 'coopangPay', 'width=560,height=760');
        if (!popup) {
            alert('팝업이 차단되었습니다. 팝업 허용 후 다시 시도해 주세요.');
            return;
        }

        popup.document.open();
        popup.document.write(buildPayLoadingHtml());
        popup.document.close();
        popup.location.replace(payWindowUrl);
    });

    const pollingTimer = setInterval(async function () {
        const response = await fetch('/api/orders/' + orderId);
        if (!response.ok) {
            return;
        }
        const data = await response.json();
        document.getElementById('orderStatus').textContent = data.status;
        if (data.status !== 'PENDING' && data.status !== 'READY') {
            clearInterval(pollingTimer);
            window.location.href = '/orders/' + orderId + '/result';
        }
    }, 1200);
</script>
</body>
</html>
