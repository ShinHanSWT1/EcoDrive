<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류 - coopang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; color: #0f172a; }
    </style>
</head>
<body>
<main class="mx-auto max-w-[700px] px-4 py-20">
    <section class="rounded-2xl border border-red-200 bg-white p-8 shadow-sm">
        <h1 class="text-2xl font-black text-red-600">처리 중 오류가 발생했습니다</h1>
        <p class="mt-3 text-sm font-medium text-slate-700" th:text="${message}">오류 메시지</p>
        <a href="/products" class="mt-6 inline-flex rounded-lg bg-[#27667B] px-4 py-2 text-sm font-bold text-white transition hover:bg-[#143D60]">
            상품 목록으로 이동
        </a>
    </section>
</main>
</body>
</html>
