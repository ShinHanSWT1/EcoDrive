<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 처리 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #eef3f1; color: #0f172a; }
    </style>
</head>
<body>
<main class="mx-auto max-w-[560px] px-4 py-10">
    <section class="rounded-2xl border border-slate-200 bg-white p-6 text-center shadow-sm">
        <h1 class="text-2xl font-black text-[#143D60]">결제 처리 완료</h1>
        <p class="mt-3 text-base font-semibold text-slate-800" th:if="${status.name() == 'PAID'}">결제가 정상 승인되었습니다.</p>
        <p class="mt-3 text-base font-semibold text-slate-800" th:if="${status.name() == 'FAILED'}">결제가 실패 처리되었습니다.</p>
        <p class="mt-3 text-base font-semibold text-slate-800" th:if="${status.name() == 'CANCELED'}">결제가 취소되었습니다.</p>
        <p class="mt-2 text-sm text-slate-500">잠시 후 원래 마켓 화면으로 돌아갑니다.</p>
        <a class="mt-5 inline-flex rounded-lg bg-[#27667B] px-4 py-2 text-sm font-bold text-white hover:bg-[#143D60]" th:href="@{/orders/{id}/result(id=${order.id})}">
            결과 페이지 바로 이동
        </a>
    </section>
</main>

<script th:inline="javascript">
    const orderId = [[${order.id}]];
    // 원 창 복귀 처리
    if (window.opener && !window.opener.closed) {
        window.opener.location.href = '/orders/' + orderId + '/result';
        setTimeout(function () {
            window.close();
        }, 600);
    }
</script>
</body>
</html>
