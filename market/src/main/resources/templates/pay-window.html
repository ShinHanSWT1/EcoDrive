<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고라니페이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #eef3f1; color: #0f172a; }
    </style>
</head>
<body>
<main class="mx-auto max-w-[560px] px-4 py-8">
    <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-black text-[#143D60]">고라니페이 결제</h1>
        <p class="mt-1 text-sm text-slate-500">새 창 결제 시뮬레이터</p>

        <div class="mt-5 space-y-2 text-sm">
            <div class="flex justify-between border-b border-slate-100 py-2"><span>주문번호</span><strong th:text="${order.id}">1001</strong></div>
            <div class="flex justify-between border-b border-slate-100 py-2"><span>상품명</span><strong th:text="${order.product.name()}">상품명</strong></div>
            <div class="flex justify-between border-b border-slate-100 py-2"><span>결제 금액</span><strong th:text="${#numbers.formatInteger(order.totalAmount, 3, 'COMMA') + '원'}">0원</strong></div>
        </div>

        <form method="post" th:action="@{/pay/window/{id}/complete(id=${order.id})}" class="mt-6">
            <input type="hidden" name="action" value="success">
            <button type="submit" class="w-full rounded-xl bg-[#27667B] py-3 text-base font-bold text-white transition hover:bg-[#143D60]">
                결제 승인
            </button>
        </form>

        <div class="mt-3 grid grid-cols-2 gap-2">
            <form method="post" th:action="@{/pay/window/{id}/complete(id=${order.id})}">
                <input type="hidden" name="action" value="fail">
                <button type="submit" class="w-full rounded-xl bg-red-600 py-3 text-sm font-bold text-white transition hover:bg-red-700">결제 실패</button>
            </form>
            <form method="post" th:action="@{/pay/window/{id}/complete(id=${order.id})}">
                <input type="hidden" name="action" value="cancel">
                <button type="submit" class="w-full rounded-xl border border-slate-300 bg-white py-3 text-sm font-bold text-slate-700 transition hover:bg-slate-50">결제 취소</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
