<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS 오류</title>
    <style>
        body {
            margin: 0;
            font-family: "Pretendard", "Noto Sans KR", sans-serif;
            background: #0f172a;
            color: #e5edf9;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: #112444;
            border: 1px solid #2f4a79;
            border-radius: 12px;
            padding: 20px;
        }
        h1 { margin: 0 0 8px; font-size: 24px; }
        p { margin: 0 0 14px; color: #a9bad7; }
        a {
            display: inline-block;
            text-decoration: none;
            background: #1a8cff;
            color: white;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>POS 처리 오류</h1>
    <p th:text="${message}">알 수 없는 오류</p>
    <a href="/pos">POS 화면 복귀</a>
</div>
</body>
</html>
